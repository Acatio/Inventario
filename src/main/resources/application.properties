spring.application.name=inventario

# Configuración de conexión a la base de datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/inventario_bd?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=120512
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuracion de Hibernate
# Actualizar o crear automáticamente las tablas en la BD si no existen
spring.jpa.hibernate.ddl-auto=update
# Imprimir las consultas SQL generadas en la consola
spring.jpa.show-sql=true
# Dar formato al codigo SQL en la consola (opcional para mejor lectura)
spring.jpa.properties.hibernate.format_sql=true


#Configurar el patron del log (en lugar de logback-spring.xml)
logging.pattern.console=[%thread] %-5level: %logger - %msg%n
# Configurar el nivel de log (INFO en este caso)
logging.level.root=INFO

#configuracion del puerto
server.port=8081